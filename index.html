<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fishing Master</title>
    <meta name="description" content="A polished HTML5 Canvas fishing game." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <main class="app">
      <canvas id="gameCanvas" aria-label="Fishing Master game canvas" role="img"></canvas>
      <div class="hint" aria-hidden="true">
        Click to cast &nbsp;·&nbsp; <kbd>Space</kbd> / Right-click to hook &nbsp;·&nbsp; <kbd>Esc</kbd> to pause
      </div>
    </main>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
